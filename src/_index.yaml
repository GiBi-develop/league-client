version: "1.0"
namespace: app.lc

entries:
  # ── Infrastructure ────────────────────────────────────
  - name: db
    kind: db.sql.sqlite
    file: "./data/league.db"
    lifecycle:
      auto_start: true

  - name: processes
    kind: process.host
    host:
      workers: 16
    lifecycle:
      auto_start: true

  # ── Environment ───────────────────────────────────────
  - name: file_env
    kind: env.storage.file
    file_path: .env
    auto_create: true

  - name: riot_api_key
    kind: env.variable
    variable: RIOT_API_KEY
    storage: app.lc:file_env

  - name: riot_platform
    kind: env.variable
    variable: RIOT_PLATFORM
    storage: app.lc:file_env

  - name: riot_region
    kind: env.variable
    variable: RIOT_REGION
    storage: app.lc:file_env

  - name: discord_webhook_url
    kind: env.variable
    variable: DISCORD_WEBHOOK_URL
    storage: app.lc:file_env

  # ── Riot API Functions ───────────────────────────────
  - name: riot_api_get_account
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_account
    modules: [http_client, json, env]

  - name: riot_api_get_summoner
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_summoner
    modules: [http_client, json, env]

  - name: riot_api_get_ranked
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_ranked
    modules: [http_client, json, env]

  - name: riot_api_get_mastery
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_mastery
    modules: [http_client, json, env]

  - name: riot_api_get_matches
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_matches
    modules: [http_client, json, env]

  - name: riot_api_get_match
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_match
    modules: [http_client, json, env]

  - name: riot_api_get_challenges
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_challenges
    modules: [http_client, json, env]

  - name: riot_api_get_active_game
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_active_game
    modules: [http_client, json, env]

  - name: riot_api_get_champion_rotations
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_champion_rotations
    modules: [http_client, json, env]

  - name: riot_api_get_status
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_status
    modules: [http_client, json, env]

  - name: riot_api_get_match_timeline
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_match_timeline
    modules: [http_client, json, env]

  # ── Data Dragon Functions ────────────────────────────
  - name: ddragon_get_items
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_items
    modules: [http_client, json]

  - name: ddragon_get_runes
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_runes
    modules: [http_client, json]
  - name: ddragon_get_version
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_latest_version
    modules: [http_client, json]

  - name: ddragon_get_champions
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_champions
    modules: [http_client, json]

  # ── Supervisor ───────────────────────────────────────
  - name: supervisor_process
    kind: process.lua
    source: file://supervisor.lua
    method: main
    modules:
      - logger
      - registry
      - time

  - name: supervisor
    kind: process.service
    process: app.lc:supervisor_process
    host: app.lc:processes
    lifecycle:
      auto_start: true
      depends_on:
        - app.lc:db
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Fetcher (generic, spawned per player) ────────────
  - name: fetcher
    kind: process.lua
    source: file://fetcher.lua
    method: main
    modules:
      - logger
      - time
      - funcs
      - events
      - env
      - contract

  # ── Data Manager ─────────────────────────────────────
  - name: data_manager_process
    kind: process.lua
    source: file://data_manager.lua
    method: main
    modules:
      - logger
      - events
      - contract
      - time

  - name: data_manager
    kind: process.service
    process: app.lc:data_manager_process
    host: app.lc:processes
    lifecycle:
      auto_start: true
      depends_on:
        - app.lc:db
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Discord Notifier ─────────────────────────────────
  - name: discord_notifier_process
    kind: process.lua
    source: file://discord_notifier.lua
    method: main
    modules:
      - logger
      - events
      - env
      - http_client
      - json

  - name: discord_notifier
    kind: process.service
    process: app.lc:discord_notifier_process
    host: app.lc:processes
    lifecycle:
      auto_start: true
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Tracked Players ─────────────────────────────────
  - name: player_grishka
    kind: registry.entry
    meta:
      type: player
      game_name: Гришка Big Шишка
      tag_line: GiBi
      platform: RU
      region: EUROPE
      fetch_interval: "10m"
      discord_notify: true

  # ── HTTP Infrastructure ──────────────────────────────
  - name: gateway
    kind: http.service
    addr: ":80"
    lifecycle:
      auto_start: true

  - name: router_http
    kind: http.router
    meta:
      server: app.lc:gateway
    prefix: /

  # ── API Endpoints ────────────────────────────────────
  - name: api_search
    kind: function.lua
    source: file://dashboard/handlers/api_search.lua
    method: handler
    modules: [http, json, funcs, env, contract]

  - name: api_search_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/search
    func: app.lc:api_search

  - name: api_player
    kind: function.lua
    source: file://dashboard/handlers/api_player.lua
    method: handler
    modules: [http, json, contract]

  - name: api_player_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/player/{puuid}
    func: app.lc:api_player

  - name: api_rotations
    kind: function.lua
    source: file://dashboard/handlers/api_rotations.lua
    method: handler
    modules: [http, json, funcs]

  - name: api_rotations_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/rotations
    func: app.lc:api_rotations

  - name: api_recent_searches
    kind: function.lua
    source: file://dashboard/handlers/api_recent_searches.lua
    method: handler
    modules: [http, json, contract]

  - name: api_recent_searches_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/recent-searches
    func: app.lc:api_recent_searches

  - name: api_status
    kind: function.lua
    source: file://dashboard/handlers/api_status.lua
    method: handler
    modules: [http, json, funcs]

  - name: api_status_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/status
    func: app.lc:api_status

  - name: api_player_stats
    kind: function.lua
    source: file://dashboard/handlers/api_player_stats.lua
    method: handler
    modules: [http, json, contract]

  - name: api_player_stats_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/player/{puuid}/stats
    func: app.lc:api_player_stats

  - name: api_match_timeline
    kind: function.lua
    source: file://dashboard/handlers/api_match_timeline.lua
    method: handler
    modules: [http, json, funcs]

  - name: api_match_timeline_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/match/{matchId}/timeline
    func: app.lc:api_match_timeline

  # ── Favorites API (#18) ─────────────────────────────
  - name: api_favorites
    kind: function.lua
    source: file://dashboard/handlers/api_favorites.lua
    method: handler
    modules: [http, json, contract]

  - name: api_favorites_get_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/favorites
    func: app.lc:api_favorites

  - name: api_favorites_post_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: POST
    path: /api/favorites
    func: app.lc:api_favorites

  - name: api_favorites_delete_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: DELETE
    path: /api/favorites
    func: app.lc:api_favorites

  # ── Match Notes API (#27) ──────────────────────────
  - name: api_match_notes
    kind: function.lua
    source: file://dashboard/handlers/api_match_notes.lua
    method: handler
    modules: [http, json, contract]

  - name: api_match_notes_get_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/match-notes
    func: app.lc:api_match_notes

  - name: api_match_notes_post_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: POST
    path: /api/match-notes
    func: app.lc:api_match_notes

  # ── Goals API (#26) ────────────────────────────────
  - name: api_goals
    kind: function.lua
    source: file://dashboard/handlers/api_goals.lua
    method: handler
    modules: [http, json, contract]

  - name: api_goals_get_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /api/goals
    func: app.lc:api_goals

  - name: api_goals_post_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: POST
    path: /api/goals
    func: app.lc:api_goals

  - name: api_goals_put_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: PUT
    path: /api/goals
    func: app.lc:api_goals

  - name: api_goals_delete_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: DELETE
    path: /api/goals
    func: app.lc:api_goals

  # ── Templates ────────────────────────────────────────
  - name: templates
    kind: template.set

  - name: layout
    kind: template.jet
    set: app.lc:templates
    source: file://templates/layout.jet

  # ── Dependencies ─────────────────────────────────────
  - name: views
    kind: ns.dependency
    component: wippy/views
    version: "*"
    parameters:
      - name: env_storage
        value: app.lc:file_env
      - name: api_router
        value: app.lc:router_http
