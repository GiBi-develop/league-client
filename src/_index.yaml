    lifecycle:
      auto_start: true
      depends_on:
        - app.lc:db
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Tracked Players ─────────────────────────────────
  - name: player_grishka
    kind: registry.entry
    meta:
      type: player
      game_name: Гришка Big Шишка
      tag_line: GiBi
      platform: RU
      region: EUROPE
      fetch_interval: "10m"
      ranked_interval: "2m"
      discord_notify: true

  # ── HTTP Infrastructure ──────────────────────────────
  - name: gateway
    kind: http.service
    addr: ":80"
    lifecycle:
      auto_start: true

  - name: router_http
    kind: http.router
    meta:
      server: app.lc:gateway
    prefix: /

  # ── API Endpoints ────────────────────────────────────
  - name: api_health
    kind: function.lua
    source: file://dashboard/handlers/api_health.lua
    method: handler
    modules: [http, contract]

  - name: api_health_endpoint
    kind: http.endpoint
    meta:
      router: app.lc:router_http
    method: GET
    path: /health
    func: app.lc:api_health

  - name: api_search
    kind: function.lua
    source: file://dashboard/handlers/api_search.lua
    method: handler
    modules: [http, json, funcs, env, contract]

  - name: api_search_endpoint
