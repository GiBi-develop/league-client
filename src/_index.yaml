  # ── Data Dragon Functions ────────────────────────────
  - name: ddragon_get_items
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_items
    modules: [http_client, json]

  - name: ddragon_get_runes
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_runes
    modules: [http_client, json]
  - name: ddragon_get_version
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_latest_version
    modules: [http_client, json]

  - name: ddragon_get_champions
    kind: function.lua
    source: file://api/data_dragon.lua
    method: get_champions
    modules: [http_client, json]

  # ── Supervisor ───────────────────────────────────────
  - name: supervisor_process
    kind: process.lua
    source: file://supervisor.lua
    method: main
    modules:
      - logger
      - registry
      - time

  - name: supervisor
    kind: process.service
    process: app.lc:supervisor_process
    host: app.lc:processes
    lifecycle:
      auto_start: true
      depends_on:
        - app.lc:db
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Fetcher (generic, spawned per player) ────────────
  - name: fetcher
    kind: process.lua
    source: file://fetcher.lua
    method: main
    modules:
      - logger
      - time
      - funcs
      - events
      - env
      - contract

  # ── Data Manager ─────────────────────────────────────
  - name: data_manager_process
    kind: process.lua
    source: file://data_manager.lua
    method: main
    modules:
      - logger
      - events
      - contract
      - time
      - funcs

  - name: data_manager
    kind: process.service
    process: app.lc:data_manager_process
    host: app.lc:processes
    lifecycle:
      auto_start: true
      depends_on:
        - app.lc:db
      restart:
        max_attempts: 10
        initial_delay: 2s
        max_delay: 60s
        backoff_factor: 2.0

  # ── Discord Notifier ─────────────────────────────────
  - name: discord_notifier_process
