version: "1.0"
namespace: app.lc.lib

entries:
  # ── Contract: Player Storage ─────────────────────────
  # Persistence layer for player data.
  #
  # Usage:
  #   local contract = require("contract")
  #   local svc = contract.open("app.lc.lib:player_storage")
  #   svc:get_player({puuid = "..."})
  #   svc:save_player({puuid = ..., game_name = ..., ...})
  #   svc:save_matches({puuid = ..., matches = {...}})
  - name: players
    kind: contract.definition
    methods:
      - name: init_schema
        description: Initialize DB schema (idempotent, called on startup)
      - name: get_player
        description: Get player profile by PUUID
      - name: save_player
        description: Save or update player profile data
      - name: get_ranked
        description: Get player ranked data by PUUID
      - name: save_ranked
        description: Save or update player ranked data
      - name: get_mastery
        description: Get player champion mastery by PUUID
      - name: save_mastery
        description: Save or update champion mastery data
      - name: get_matches
        description: Get recent matches for a player
      - name: save_match
        description: Save a match record
      - name: list_tracked_players
        description: List all tracked players with their data
      - name: save_recent_search
        description: Save a recent player search
      - name: get_recent_searches
        description: Get recent searches with ranked data
      - name: save_match_participants
        description: Save all participants for a match
      - name: get_match_participants
        description: Get participants for given match IDs
      - name: check_existing_matches
        description: Check which match IDs already exist in DB
      - name: save_challenges
        description: Save player challenges summary
      - name: get_challenges
        description: Get cached player challenges
      - name: save_ranked_history
        description: Record LP snapshot for ranked history
      - name: get_ranked_history
        description: Get ranked history for LP progression
      - name: get_duo_partners
        description: Get frequent duo partners from match data
      - name: get_winrate_history
        description: Get daily win rate aggregates
      - name: save_ddragon_cache
        description: Save DDragon cache entry
      - name: get_ddragon_cache
        description: Get DDragon cache entry with TTL
      - name: save_favorite
        description: Save a player as favorite
      - name: remove_favorite
        description: Remove a player from favorites
      - name: get_favorites
        description: Get all favorite players with ranked data
      - name: is_favorite
        description: Check if a player is favorited
      - name: save_match_note
        description: Save a note for a match
      - name: get_match_notes
        description: Get all match notes for a player
      - name: save_goal
        description: Save a player goal
      - name: get_goals
        description: Get goals for a player
      - name: complete_goal
        description: Mark a goal as completed
      - name: delete_goal
        description: Delete a goal
      - name: set_player_ingame
        description: Set player in-game status
      - name: enqueue_notification
        description: Enqueue a failed notification for retry
      - name: get_pending_notifications
        description: Get pending notifications due for retry
      - name: update_notification_attempt
        description: Mark notification delivered or schedule next retry
      - name: list_managed_players
        description: List dynamically managed tracked players
      - name: add_managed_player
        description: Add a managed tracked player
      - name: remove_managed_player
        description: Deactivate a managed tracked player
      - name: get_notification_prefs
        description: Get notification preferences for a player
      - name: save_notification_prefs
        description: Save notification preferences for a player
      - name: get_today_stats
        description: Get today's match stats for a player
      - name: get_peak_lp
        description: Get peak LP (best-ever rank) per queue
      - name: get_recent_avg_stats
        description: Get average stats from recent matches
      - name: get_personal_enemies
        description: Get enemy champions with worst personal win rate
      - name: save_api_metric
        description: Save an API call metric for monitoring
      - name: get_api_metrics_summary
        description: Get API metrics summary for last hour
      - name: get_player_freshness
        description: Get data freshness for all tracked players
      - name: save_record
        description: Save or update a personal record if new best
      - name: get_records
        description: Get all personal records for a player
      - name: get_season_history
        description: Get ranked history aggregated by season
      - name: get_match_recap
        description: Get template-based text recap for a match
      - name: compute_performance_score
        description: Compute 0-100 performance score for a match
      - name: save_timeline_stats
        description: Save parsed match timeline stats
      - name: get_timeline_stats
        description: Get timeline stats for player matches
      - name: get_role_distribution
        description: Get games and win rate per role/position
      - name: get_damage_profile
        description: Get average damage composition breakdown
      - name: get_duration_analysis
        description: Get win rate by game duration buckets
      - name: get_time_analysis
        description: Get win rate by hour and day of week
      - name: get_surrender_stats
        description: Get surrender rate, remake count, first blood rate
      - name: get_queue_breakdown
        description: Get per-queue stats breakdown
      - name: get_spell_analysis
        description: Get summoner spell combo win rates
      - name: update_match_lp
        description: Update LP change for a specific match
      - name: get_champion_matchups
        description: Get per-champion matchup win rates for a player
      - name: get_champion_global_stats
        description: Get global champion stats aggregated from all matches
      - name: get_vision_trend
        description: Get vision score trend over recent matches
      - name: get_peer_percentiles
        description: Get stat percentiles compared to other tracked players
      - name: get_early_game_stats
        description: Get early game averages from timeline data
      - name: get_champion_builds
        description: Get aggregated rune and spell builds for a champion
      - name: get_objective_stats
        description: Get objective control averages (dragons, barons, heralds)
      - name: get_tilt_score
        description: Compute tilt probability score from recent matches
      - name: search_players
        description: Search cached players by name for autocomplete

