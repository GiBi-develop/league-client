version: "1.0"
namespace: app.lc.lib

entries:
  # ── Contract: Player Storage ─────────────────────────
  # Persistence layer for player data.
  #
  # Usage:
  #   local contract = require("contract")
  #   local svc = contract.open("app.lc.lib:player_storage")
  #   svc:get_player({puuid = "..."})
  #   svc:save_player({puuid = ..., game_name = ..., ...})
  #   svc:save_matches({puuid = ..., matches = {...}})
  - name: players
    kind: contract.definition
    methods:
      - name: init_schema
        description: Initialize DB schema (idempotent, called on startup)
      - name: get_player
        description: Get player profile by PUUID
      - name: save_player
        description: Save or update player profile data
      - name: get_ranked
        description: Get player ranked data by PUUID
      - name: save_ranked
        description: Save or update player ranked data
      - name: get_mastery
        description: Get player champion mastery by PUUID
      - name: save_mastery
        description: Save or update champion mastery data
      - name: get_matches
        description: Get recent matches for a player
      - name: save_match
        description: Save a match record
      - name: list_tracked_players
        description: List all tracked players with their data
      - name: save_recent_search
        description: Save a recent player search
      - name: get_recent_searches
        description: Get recent searches with ranked data
      - name: save_match_participants
        description: Save all participants for a match
      - name: get_match_participants
        description: Get participants for given match IDs
      - name: check_existing_matches
        description: Check which match IDs already exist in DB
      - name: save_challenges
        description: Save player challenges summary
      - name: get_challenges
        description: Get cached player challenges
      - name: save_ranked_history
        description: Record LP snapshot for ranked history
      - name: get_ranked_history
        description: Get ranked history for LP progression
      - name: get_duo_partners
        description: Get frequent duo partners from match data
      - name: get_winrate_history
        description: Get daily win rate aggregates
      - name: save_ddragon_cache
        description: Save DDragon cache entry
      - name: get_ddragon_cache
        description: Get DDragon cache entry with TTL

  - name: players_init_schema
    kind: function.lua
    source: file://players.lua
    method: init_schema
    modules: [sql]

  - name: players_get_player
    kind: function.lua
    source: file://players.lua
    method: get_player
    modules: [sql]

  - name: players_save_player
    kind: function.lua
    source: file://players.lua
    method: save_player
    modules: [sql]

  - name: players_get_ranked
    kind: function.lua
    source: file://players.lua
    method: get_ranked
    modules: [sql]

  - name: players_save_ranked
    kind: function.lua
    source: file://players.lua
    method: save_ranked
    modules: [sql]

  - name: players_get_mastery
    kind: function.lua
    source: file://players.lua
    method: get_mastery
    modules: [sql]

  - name: players_save_mastery
    kind: function.lua
    source: file://players.lua
    method: save_mastery
    modules: [sql]

  - name: players_get_matches
    kind: function.lua
    source: file://players.lua
    method: get_matches
    modules: [sql]

  - name: players_save_match
    kind: function.lua
    source: file://players.lua
    method: save_match
    modules: [sql, json]

  - name: players_list_tracked
    kind: function.lua
    source: file://players.lua
    method: list_tracked_players
    modules: [sql]

  - name: players_save_recent_search
    kind: function.lua
    source: file://players.lua
    method: save_recent_search
    modules: [sql]

  - name: players_get_recent_searches
    kind: function.lua
    source: file://players.lua
    method: get_recent_searches
    modules: [sql]

  - name: players_save_match_participants
    kind: function.lua
    source: file://players.lua
    method: save_match_participants
    modules: [sql, json]

  - name: players_get_match_participants
    kind: function.lua
    source: file://players.lua
    method: get_match_participants
    modules: [sql, json]

  - name: players_check_existing_matches
    kind: function.lua
    source: file://players.lua
    method: check_existing_matches
    modules: [sql]

  - name: players_save_challenges
    kind: function.lua
    source: file://players.lua
    method: save_challenges
    modules: [sql]

  - name: players_get_challenges
    kind: function.lua
    source: file://players.lua
    method: get_challenges
    modules: [sql]

  - name: players_save_ranked_history
    kind: function.lua
    source: file://players.lua
    method: save_ranked_history
    modules: [sql]

  - name: players_get_ranked_history
    kind: function.lua
    source: file://players.lua
    method: get_ranked_history
    modules: [sql]

  - name: players_get_duo_partners
    kind: function.lua
    source: file://players.lua
    method: get_duo_partners
    modules: [sql]

  - name: players_get_winrate_history
    kind: function.lua
    source: file://players.lua
    method: get_winrate_history
    modules: [sql]

  - name: players_save_ddragon_cache
    kind: function.lua
    source: file://players.lua
    method: save_ddragon_cache
    modules: [sql]

  - name: players_get_ddragon_cache
    kind: function.lua
    source: file://players.lua
    method: get_ddragon_cache
    modules: [sql]

  - name: player_storage
    kind: contract.binding
    contracts:
      - contract: app.lc.lib:players
        default: true
        methods:
          init_schema: app.lc.lib:players_init_schema
          get_player: app.lc.lib:players_get_player
          save_player: app.lc.lib:players_save_player
          get_ranked: app.lc.lib:players_get_ranked
          save_ranked: app.lc.lib:players_save_ranked
          get_mastery: app.lc.lib:players_get_mastery
          save_mastery: app.lc.lib:players_save_mastery
          get_matches: app.lc.lib:players_get_matches
          save_match: app.lc.lib:players_save_match
          list_tracked_players: app.lc.lib:players_list_tracked
          save_recent_search: app.lc.lib:players_save_recent_search
          get_recent_searches: app.lc.lib:players_get_recent_searches
          save_match_participants: app.lc.lib:players_save_match_participants
          get_match_participants: app.lc.lib:players_get_match_participants
          check_existing_matches: app.lc.lib:players_check_existing_matches
          save_challenges: app.lc.lib:players_save_challenges
          get_challenges: app.lc.lib:players_get_challenges
          save_ranked_history: app.lc.lib:players_save_ranked_history
          get_ranked_history: app.lc.lib:players_get_ranked_history
          get_duo_partners: app.lc.lib:players_get_duo_partners
          get_winrate_history: app.lc.lib:players_get_winrate_history
          save_ddragon_cache: app.lc.lib:players_save_ddragon_cache
          get_ddragon_cache: app.lc.lib:players_get_ddragon_cache
