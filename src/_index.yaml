version: "1.0"
namespace: app.lc

entries:
  # ── Infrastructure ────────────────────────────────────
  - name: db
    kind: db.sql.sqlite
    file: "./data/league.db"
    lifecycle:
      auto_start: true

  - name: processes
    kind: process.host
    host:
      workers: 16
    lifecycle:
      auto_start: true

  # ── Environment ───────────────────────────────────────
  - name: file_env
    kind: env.storage.file
    file_path: .env
    auto_create: true

  - name: riot_api_key
    kind: env.variable
    variable: RIOT_API_KEY
    storage: app.lc:file_env

  - name: riot_platform
    kind: env.variable
    variable: RIOT_PLATFORM
    storage: app.lc:file_env

  - name: riot_region
    kind: env.variable
    variable: RIOT_REGION
    storage: app.lc:file_env

  - name: discord_webhook_url
    kind: env.variable
    variable: DISCORD_WEBHOOK_URL
    storage: app.lc:file_env

  - name: telegram_bot_token
    kind: env.variable
    variable: TELEGRAM_BOT_TOKEN
    storage: app.lc:file_env

  - name: telegram_chat_id
    kind: env.variable
    variable: TELEGRAM_CHAT_ID
    storage: app.lc:file_env

  - name: dashboard_password
    kind: env.variable
    variable: DASHBOARD_PASSWORD
    storage: app.lc:file_env

  # ── Riot API Functions ───────────────────────────────
  - name: riot_api_get_account
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_account
    modules: [http_client, json, env]

  - name: riot_api_get_summoner
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_summoner
    modules: [http_client, json, env]

  - name: riot_api_get_ranked
    kind: function.lua
    source: file://api/riot_api.lua
    method: get_ranked
    modules: [http_client, json, env]

  - name: riot_api_get_mastery
